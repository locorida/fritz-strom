services:
  web:
    image: php:8.4-apache
    ports:
      - "9090:80"
    volumes:
      - ./src:/var/www/html
      - ./data:/var/www/data
    env_file:
      - .env
    restart: unless-stopped
    extra_hosts:
      - "fritz.box:192.168.178.1"

  collector:
    image: php:8.4-cli
    volumes:
      - ./collector:/app
      - ./data:/var/www/data
    env_file:
      - .env
    restart: unless-stopped
    extra_hosts:
      - "fritz.box:192.168.178.1"
    command: php /app/collect.php

  tsun-collector:
    image: php:8.4-cli
    volumes:
      - ./collector:/app
      - ./data:/var/www/data
    restart: unless-stopped
    depends_on:
      - mqtt-broker
    command: php /app/collect_tsun.php

  tsun-proxy:
    image: ghcr.io/s-allius/tsun-gen3-proxy:latest
    ports:
      - "5005:5005"
      - "8127:8127"
    dns:
      - 8.8.8.8
      - 8.8.4.4
    volumes:
      - ./tsun-config:/home/tsun-proxy/config
      - ./tsun-log:/home/tsun-proxy/log
    restart: unless-stopped
    depends_on:
      - mqtt-broker

  mqtt-broker:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
    restart: unless-stopped

  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:stable
    container_name: homeassistant
    network_mode: host
    volumes:
      - ./homeassistant/config:/config
    environment:
      - TZ=Europe/Berlin
    restart: unless-stopped


