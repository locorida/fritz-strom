<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRITZ!Box Energiemonitor</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3"></script>
    <style>
        :root {
            --bg: #0f1117; --surface: #1a1d27; --border: #2a2d3a;
            --text: #e4e4e7; --muted: #9ca3af; --accent: #3b82f6;
            --green: #22c55e; --red: #ef4444; --orange: #f59e0b;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: var(--bg); color: var(--text); min-height: 100vh; padding: 1.5rem;
        }
        h1 { font-size: 1.4rem; font-weight: 600; margin-bottom: 1.2rem; }
        h1 .fritz { color: var(--accent); }

        .live-bar {
            display: flex; align-items: center; gap: 0.8rem;
            background: var(--surface); border: 1.5px solid var(--border);
            border-radius: 10px; padding: 0.5rem 1rem; margin-bottom: 0.6rem;
            transition: border-color 0.5s, background 0.5s;
        }
        .live-bar.lb-go      { border-color: var(--green); background: rgba(34,197,94,0.07); }
        .live-bar.lb-wait    { border-color: var(--red);   background: rgba(239,68,68,0.05); }
        .live-bar.lb-neutral { border-color: var(--accent); background: rgba(59,130,246,0.04); }
        .live-bar .lb-icon   { font-size: 1.4rem; line-height: 1; flex-shrink: 0; }
        .live-bar .lb-power  { font-size: 1.1rem; font-weight: 700; white-space: nowrap; }
        .live-bar .lb-label  { font-size: 0.82rem; font-weight: 600; }
        .live-bar .lb-sub    { font-size: 0.75rem; color: var(--muted); }
        .live-bar .lb-sep    { width: 1px; height: 24px; background: var(--border); flex-shrink: 0; }

        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(125px, 1fr));
            gap: 0.4rem;
            margin-bottom: 0.6rem;
        }
        .kpi {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 6px; padding: 0.45rem 0.7rem;
        }
        .kpi .label { font-size: 0.65rem; color: var(--muted); margin-bottom: 0.1rem; }
        .kpi .val { font-size: 1.05rem; font-weight: 700; font-variant-numeric: tabular-nums; }
        .kpi .sub { font-size: 0.62rem; color: var(--muted); margin-top: 0.05rem; }
        .c-blue { color: var(--accent); }
        .c-red { color: var(--red); }
        .c-green { color: var(--green); }
        .c-orange { color: var(--orange); }

        .controls {
            display: flex; gap: 0.6rem; margin-bottom: 1rem; flex-wrap: wrap; align-items: center;
        }
        .btn-group {
            display: inline-flex; border: 1px solid var(--border); border-radius: 8px; overflow: hidden;
        }
        .btn-group button {
            background: var(--surface); color: var(--text); border: none;
            padding: 0.45rem 0.9rem; font-size: 0.82rem; cursor: pointer; transition: background 0.15s;
        }
        .btn-group button:not(:last-child) { border-right: 1px solid var(--border); }
        .btn-group button:hover { background: var(--border); }
        .btn-group button.active { background: var(--accent); color: #fff; }

        .chart-wrap {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 12px; padding: 1.2rem; position: relative;
        }
        #chart { width: 100%; height: 420px; }
        .range-row {
            display: flex; gap: 0.6rem; align-items: center; flex-wrap: wrap;
        }
        .range-row label { font-size: 0.82rem; color: var(--muted); }
        .range-row input {
            background: var(--surface); color: var(--text); border: 1px solid var(--border);
            border-radius: 6px; padding: 0.4rem 0.6rem; font-size: 0.82rem;
            font-family: inherit;
        }
        .range-row input:focus { outline: none; border-color: var(--accent); }
        .range-row .range-btn {
            background: var(--surface); color: var(--text); border: 1px solid var(--border);
            border-radius: 6px; padding: 0.4rem 0.8rem; font-size: 0.82rem;
            cursor: pointer; transition: background 0.15s;
        }
        .range-row .range-btn:hover { background: var(--border); }
        .range-row .range-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
        .range-detail {
            background: var(--surface); border: 1px solid var(--accent);
            border-radius: 10px; padding: 0.8rem 1.2rem; margin-bottom: 1rem;
            display: none;
        }
        .range-detail.visible { display: block; }
        .range-detail h3 {
            font-size: 0.8rem; color: var(--accent); font-weight: 600;
            margin-bottom: 0.5rem; display: flex; align-items: center; gap: 0.5rem;
        }
        .range-detail .range-kpis {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 0.5rem;
        }
        .range-detail .range-kpis .kpi { background: rgba(255,255,255,0.03); }
        .status { margin-top: 0.8rem; font-size: 0.78rem; color: var(--muted); }
        .status.error { color: var(--red); }
        .loading {
            position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
            background: rgba(15,17,23,0.7); border-radius: 12px; font-size: 0.9rem; color: var(--muted);
        }
        .loading.hidden { display: none; }

        .battery-section {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 10px; margin-bottom: 0.6rem;
        }
        .battery-toggle {
            font-size: 0.8rem; font-weight: 600; color: var(--muted);
            display: flex; align-items: center; gap: 0.5rem;
            padding: 0.6rem 1rem; cursor: pointer; user-select: none;
            background: none; border: none; width: 100%; text-align: left;
            font-family: inherit; transition: color 0.15s;
        }
        .battery-toggle:hover { color: var(--text); }
        .battery-toggle .chevron {
            transition: transform 0.25s; display: inline-block; font-size: 0.7rem;
        }
        .battery-section.open .battery-toggle .chevron { transform: rotate(90deg); }
        .battery-body {
            display: none; padding: 0 1rem 0.7rem;
        }
        .battery-section.open .battery-body { display: block; }
        .battery-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(125px, 1fr)); gap: 0.4rem;
        }
        .battery-grid .kpi { background: rgba(255,255,255,0.03); }

        .weather-section {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 12px; padding: 1rem 1.2rem; margin-bottom: 1rem;
        }
        .weather-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 0.8rem;
        }
        .weather-header h2 {
            font-size: 0.85rem; font-weight: 600; color: var(--muted); margin: 0;
            display: flex; align-items: center; gap: 0.5rem;
        }
        .plz-form {
            display: flex; align-items: center; gap: 0.4rem;
        }
        .plz-form input {
            background: var(--bg); color: var(--text); border: 1px solid var(--border);
            border-radius: 6px; padding: 0.3rem 0.5rem; font-size: 0.8rem;
            width: 5.5rem; text-align: center; font-family: inherit;
        }
        .plz-form input:focus { outline: none; border-color: var(--accent); }
        .plz-form button {
            background: var(--accent); color: #fff; border: none; border-radius: 6px;
            padding: 0.3rem 0.7rem; font-size: 0.8rem; cursor: pointer;
            font-family: inherit; transition: opacity 0.15s;
        }
        .plz-form button:hover { opacity: 0.85; }

        .weather-body {
            display: grid; grid-template-columns: auto 1fr; gap: 1.2rem;
            align-items: start;
        }
        .wx-current {
            display: flex; flex-direction: column; gap: 0.3rem; min-width: 160px;
        }
        .wx-current .wx-main {
            display: flex; align-items: center; gap: 0.8rem;
        }
        .wx-current .wx-icon { font-size: 2.4rem; line-height: 1; }
        .wx-current .wx-temp { font-size: 1.8rem; font-weight: 700; }
        .wx-current .wx-desc { font-size: 0.82rem; color: var(--muted); }
        .wx-current .wx-details {
            display: flex; gap: 1rem; font-size: 0.75rem; color: var(--muted); margin-top: 0.15rem;
        }

        .wx-reco-banner {
            border-radius: 10px; padding: 0.7rem 1rem; margin-bottom: 0.8rem;
            display: flex; align-items: center; gap: 0.8rem;
        }
        .wx-reco-banner .reco-icon { font-size: 1.6rem; line-height: 1; flex-shrink: 0; }
        .wx-reco-banner .reco-text { flex: 1; }
        .wx-reco-banner .reco-title { font-size: 0.95rem; font-weight: 700; }
        .wx-reco-banner .reco-sub { font-size: 0.78rem; margin-top: 0.15rem; opacity: 0.85; }
        .wx-reco-banner.reco-good {
            background: rgba(34,197,94,0.12); border: 1.5px solid var(--green); color: var(--green);
        }
        .wx-reco-banner.reco-ok {
            background: rgba(245,158,11,0.10); border: 1.5px solid var(--orange); color: var(--orange);
        }
        .wx-reco-banner.reco-bad {
            background: rgba(239,68,68,0.08); border: 1.5px solid var(--red); color: var(--red);
        }

        .solar-timeline { margin-top: 0.6rem; }
        .solar-timeline-label {
            font-size: 0.72rem; color: var(--muted); margin-bottom: 0.35rem;
            display: flex; justify-content: space-between;
        }
        .solar-track {
            display: flex; height: 28px; border-radius: 6px; overflow: hidden;
            background: rgba(75,85,99,0.2); position: relative;
        }
        .solar-seg {
            height: 100%; transition: background 0.4s;
            position: relative; display: flex; align-items: center; justify-content: center;
            font-size: 0.65rem; font-weight: 600; color: transparent; overflow: hidden;
        }
        .solar-seg.seg-good  { background: rgba(34,197,94,0.65); color: rgba(255,255,255,0.9); }
        .solar-seg.seg-ok    { background: rgba(245,158,11,0.5); color: rgba(255,255,255,0.8); }
        .solar-seg.seg-low   { background: rgba(156,163,175,0.25); }
        .solar-seg.seg-none  { background: rgba(75,85,99,0.15); }
        .solar-now-marker {
            position: absolute; top: -3px; bottom: -3px; width: 2.5px;
            background: var(--accent); border-radius: 2px; z-index: 2;
            box-shadow: 0 0 6px rgba(59,130,246,0.6);
        }
        .solar-hours {
            display: flex; justify-content: space-between;
            font-size: 0.65rem; color: var(--muted); margin-top: 0.25rem;
            padding: 0 1px;
        }
        .solar-legend {
            display: flex; gap: 1rem; margin-top: 0.5rem; font-size: 0.7rem; color: var(--muted);
        }
        .solar-legend span::before {
            content: ''; display: inline-block; width: 10px; height: 10px;
            border-radius: 2px; margin-right: 4px; vertical-align: -1px;
        }
        .solar-legend .leg-good::before  { background: rgba(34,197,94,0.65); }
        .solar-legend .leg-ok::before    { background: rgba(245,158,11,0.5); }
        .solar-legend .leg-low::before   { background: rgba(156,163,175,0.25); }

        .wx-placeholder {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            gap: 0.6rem; padding: 1.5rem; color: var(--muted); font-size: 0.85rem;
        }
        .wx-placeholder .wx-prompt { font-size: 1.5rem; }

        @media (max-width: 700px) {
            .weather-body { grid-template-columns: 1fr; }
            .top-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<h1><span class="fritz">FRITZ!Box</span> Energiemonitor</h1>

<div class="live-bar lb-neutral" id="liveBar">
    <span class="lb-icon" id="lbIcon">&#9889;</span>
    <span class="lb-power" id="lbPower">-- W</span>
    <span class="lb-label" id="lbLabel">Wird ermittelt…</span>
    <span class="lb-sub" id="lbSub">Warte auf Messung</span>
</div>

<div class="weather-section" id="weatherSection">
    <div class="weather-header">
        <h2 id="wxHeading">&#9728;&#65039; Wetter</h2>
        <div class="plz-form">
            <input type="text" id="plzInput" placeholder="PLZ" maxlength="5" inputmode="numeric">
            <button id="plzSave">Laden</button>
        </div>
    </div>
    <div id="wxContent">
        <div class="wx-placeholder">
            <div class="wx-prompt">&#127780;&#65039;</div>
            <div>PLZ eingeben, um Wetter &amp; Solarprognose zu laden</div>
        </div>
    </div>
</div>

<div class="kpi-grid" id="kpiGrid"></div>

<div class="battery-section" id="batterySection" style="display:none">
    <button class="battery-toggle" id="batteryToggle">
        <span class="chevron">&#9658;</span>
        &#128267; Speicher-Simulation: <span id="batteryName"></span>
    </button>
    <div class="battery-body">
        <div class="battery-grid" id="batteryGrid"></div>
    </div>
</div>

<div class="controls">
    <div class="btn-group" id="periodGroup">
        <button data-value="day">Live (60 Min)</button>
        <button data-value="today" class="active">Heute</button>
        <button data-value="week">Woche</button>
        <button data-value="month">Monat</button>
        <button data-value="year">Jahr</button>
        <button data-value="total">Total</button>
    </div>
    <div class="btn-group" id="unitGroup">
        <button data-value="Wh">Wh</button>
        <button data-value="kWh" class="active">kWh</button>
    </div>
    <div class="btn-group" id="styleGroup">
        <button data-value="grouped" class="active">Gruppiert</button>
        <button data-value="stacked">Gestapelt</button>
    </div>
    <div class="range-row" id="rangeRow">
        <label>Von</label>
        <input type="time" id="rangeFrom">
        <label>Bis</label>
        <input type="time" id="rangeTo">
        <button class="range-btn" id="rangeApply">Anwenden</button>
        <button class="range-btn" id="rangeReset" style="display:none">Zurücksetzen</button>
    </div>
</div>

<div class="range-detail" id="rangeDetail">
    <h3><span>&#128269;</span> <span id="rangeTitle">Auswahl</span></h3>
    <div class="range-kpis" id="rangeKpis"></div>
</div>

<div class="chart-wrap">
    <canvas id="chart"></canvas>
    <div class="loading hidden" id="loading">Daten werden geladen…</div>
</div>

<div class="status" id="status"></div>

<script>
const COLORS = {
    bezug:     { bg: 'rgba(239,68,68,0.7)',  border: '#ef4444' },
    einspeise: { bg: 'rgba(34,197,94,0.7)',  border: '#22c55e' },
};

let chart = null, currentPeriod = 'today', currentUnit = 'kWh', currentStyle = 'grouped';
let seriesConfigs = [], allStats = {};
let prices = { bezug: 31.72, einspeisung: 8.0 };
let battery = { capacity: 1.92, price: 399, name: 'Speicher' };
let prevLive = null, currentDirection = null;
let activeRange = null;
let historyData = null, historyAvailableDays = [];

function fmt(v, d = 1) { return v.toLocaleString('de-DE', { maximumFractionDigits: d }); }
function setStatus(msg, err = false) { const el = document.getElementById('status'); el.textContent = msg; el.className = err ? 'status error' : 'status'; }
function showLoading(v) { document.getElementById('loading').classList.toggle('hidden', !v); }
function setupBtnGroup(id, cb) { document.getElementById(id).querySelectorAll('button').forEach(btn => { btn.addEventListener('click', () => { btn.parentElement.querySelector('.active')?.classList.remove('active'); btn.classList.add('active'); cb(btn.dataset.value); }); }); }

function periodConfig(p) {
    switch (p) {
        case 'day':   return { type:'history', unit:'minute', maxAge: 3600 };
        case 'today': return { type:'history', unit:'hour', maxAge: null };
        case 'week':  return { type:'energy', grid:86400,   max:7,   unit:'day' };
        case 'month': return { type:'energy', grid:86400,   max:31,  unit:'day' };
        case 'year':  return { type:'energy', grid:2678400, max:12,  unit:'month' };
        case 'total': return { type:'energy_total', unit:'month' };
    }
}

function buildTimestamps(dt, grid, count, period) {
    const ms = dt * 1000, out = [];
    for (let i = 0; i < count; i++) {
        if (period === 'year') { const b = new Date(ms); out.push(new Date(b.getFullYear(), b.getMonth()-i, 1)); }
        else if (period === 'month' || period === 'week') { const d = new Date(ms); d.setDate(d.getDate()-i); d.setHours(0,0,0,0); out.push(d); }
        else out.push(new Date(ms - i*grid*1000));
    }
    return out;
}

function updateSignal(liveData) {
    const bar   = document.getElementById('liveBar');
    const icon  = document.getElementById('lbIcon');
    const power = document.getElementById('lbPower');
    const label = document.getElementById('lbLabel');
    const sub   = document.getElementById('lbSub');

    const powerW = liveData.meters[0]?.power / 1000 || 0;

    if (!prevLive) {
        prevLive = liveData;
        power.textContent = `${fmt(powerW, 0)} W`;
        label.textContent = 'Richtung wird erkannt…';
        sub.textContent = '';
        return;
    }

    const find = (data, s) => data.meters.find(m => m.ain.endsWith(s));
    const bNow = find(liveData, '-1'), eNow = find(liveData, '-2');
    const bPrev = find(prevLive, '-1'), ePrev = find(prevLive, '-2');
    if (!bNow || !eNow || !bPrev || !ePrev) return;

    const dBezug = bNow.energy - bPrev.energy;
    const dEinsp = eNow.energy - ePrev.energy;

    power.textContent = `${fmt(powerW, 0)} W`;

    if (dEinsp > dBezug) {
        currentDirection = 'export';
        bar.className = 'live-bar lb-go';
        icon.textContent = '⬆';
        label.textContent = 'Einspeisung';
        sub.textContent = `Solar-Überschuss — Geräte jetzt starten!`;
    } else if (dBezug > 0) {
        currentDirection = 'import';
        bar.className = 'live-bar lb-wait';
        icon.textContent = '⬇';
        label.textContent = 'Netzbezug';
        sub.textContent = `${fmt(prices.bezug, 1)} ct/kWh`;
    } else {
        currentDirection = 'balanced';
        bar.className = 'live-bar lb-neutral';
        icon.textContent = '⚖';
        label.textContent = 'Ausgeglichen';
        sub.textContent = 'Produktion ≈ Verbrauch';
    }

    prevLive = liveData;
}

function renderChart() {
    const cfg = periodConfig(currentPeriod);
    const stacked = currentStyle === 'stacked';
    const isPower = cfg.type === 'power';
    const isHistory = cfg.type === 'history';
    const isTotal = cfg.type === 'energy_total';
    const div = (!isPower && !isHistory && currentUnit === 'kWh') ? 1000 : 1;
    const yL = (isPower || isHistory) ? 'W' : currentUnit;
    let datasets = [];
    let labels = null;
    let chartType = 'bar';

    if (isHistory) {
        if (historyData?.readings?.length) {
            labels = [];
            const bezugData = [], einspData = [], unknownData = [];
            const now = Math.floor(Date.now() / 1000);
            const cutoff = cfg.maxAge ? now - cfg.maxAge : 0;

            historyData.readings.forEach(r => {
                if (r.ts < cutoff) return;
                labels.push(new Date(r.ts * 1000));
                const w = r.power;
                if (r.direction === 'export') {
                    bezugData.push(0); einspData.push(w); unknownData.push(0);
                } else if (r.direction === 'import') {
                    bezugData.push(w); einspData.push(0); unknownData.push(0);
                } else {
                    bezugData.push(0); einspData.push(0); unknownData.push(w);
                }
            });
            datasets.push({
                label: 'Bezug', data: bezugData,
                backgroundColor: 'rgba(239,68,68,0.15)', borderColor: '#ef4444',
                borderWidth: 1.5, pointRadius: 0, tension: 0.3, fill: true,
            });
            datasets.push({
                label: 'Einspeisung', data: einspData,
                backgroundColor: 'rgba(34,197,94,0.15)', borderColor: '#22c55e',
                borderWidth: 1.5, pointRadius: 0, tension: 0.3, fill: true,
            });
            const hasUnknown = unknownData.some(v => v > 0);
            if (hasUnknown) {
                datasets.push({
                    label: 'Netzleistung', data: unknownData,
                    backgroundColor: 'rgba(59,130,246,0.1)', borderColor: '#3b82f6',
                    borderWidth: 1.5, pointRadius: 0, tension: 0.3, fill: true,
                });
            }
            chartType = 'line';
        }
    } else if (isPower) {
        const s = allStats[seriesConfigs[0]?.ain];
        if (s?.power) {
            const b = s.power.find(x => x.grid === cfg.grid);
            if (b) {
                const n = Math.min(b.values.length, cfg.max);
                labels = buildTimestamps(b.datatime, cfg.grid, n, currentPeriod);

                const dirLabel = currentDirection === 'export' ? 'Einspeisung' :
                                 currentDirection === 'import' ? 'Netzbezug' : 'Netzleistung';
                const dirColor = currentDirection === 'export' ? { bg: 'rgba(34,197,94,0.15)', border: '#22c55e' } :
                                 currentDirection === 'import' ? { bg: 'rgba(239,68,68,0.15)', border: '#ef4444' } :
                                 { bg: 'rgba(59,130,246,0.15)', border: '#3b82f6' };

                datasets.push({ label: dirLabel, data: b.values.slice(0,n),
                    backgroundColor: dirColor.bg, borderColor: dirColor.border,
                    borderWidth: 2, pointRadius: 0, tension: 0.3, fill: true });
                chartType = 'line';
            }
        }
    } else if (isTotal) {
        const bM = allStats[seriesConfigs.find(c => !c.label.toLowerCase().includes('einspe'))?.ain];
        const eM = allStats[seriesConfigs.find(c => c.label.toLowerCase().includes('einspe'))?.ain];
        if (bM?.energy && eM?.energy) {
            const bData = bM.energy.find(x => x.grid === 2678400);
            const eData = eM.energy.find(x => x.grid === 2678400);
            if (bData && eData) {
                const n = Math.max(bData.values.length, eData.values.length);
                labels = buildTimestamps(bData.datatime, 2678400, n, 'year');
                const bVals = bData.values.slice(0, n).map(v => v / (currentUnit === 'kWh' ? 1000 : 1));
                const eVals = eData.values.slice(0, n).map(v => v / (currentUnit === 'kWh' ? 1000 : 1));
                datasets.push({ label: 'Bezug', data: bVals,
                    backgroundColor: COLORS.bezug.bg, borderColor: COLORS.bezug.border,
                    borderWidth: 1, borderRadius: 3, maxBarThickness: 40 });
                datasets.push({ label: 'Einspeisung', data: eVals,
                    backgroundColor: COLORS.einspeise.bg, borderColor: COLORS.einspeise.border,
                    borderWidth: 1, borderRadius: 3, maxBarThickness: 40 });
            }
        }
    } else {
        seriesConfigs.forEach(sc => {
            const s = allStats[sc.ain]; if (!s) return;
            const b = s.energy.find(x => x.grid === cfg.grid); if (!b) return;
            const n = Math.min(b.values.length, cfg.max);
            if (!labels) labels = buildTimestamps(b.datatime, cfg.grid, n, currentPeriod);
            const isE = sc.label.toLowerCase().includes('einspe');
            const c = isE ? COLORS.einspeise : COLORS.bezug;
            datasets.push({ label: sc.label, data: b.values.slice(0,n).map(v => v/div),
                backgroundColor: c.bg, borderColor: c.border, borderWidth: 1, borderRadius: 3, maxBarThickness: 40 });
        });
    }
    if (!labels?.length) { setStatus('Keine Daten.', true); return; }
    labels.reverse(); datasets.forEach(ds => ds.data.reverse());

    const filtered = filterByRange(labels, datasets);
    if (filtered.empty) {
        const first = labels[0] instanceof Date ? labels[0] : new Date(labels[0]);
        const last = labels[labels.length - 1] instanceof Date ? labels[labels.length - 1] : new Date(labels[labels.length - 1]);
        const fmtTime = d => d.toLocaleTimeString('de-DE', {hour:'2-digit',minute:'2-digit'});
        const fmtDate = d => d.toLocaleDateString('de-DE');
        const hint = (currentPeriod === 'day' || currentPeriod === 'today')
            ? `Verfügbar: ${fmtTime(first)} – ${fmtTime(last)}`
            : `Verfügbar: ${fmtDate(first)} – ${fmtDate(last)}`;
        setStatus(`Keine Daten im gewählten Zeitraum. ${hint}`, true);
        renderRangeDetail([], []);
        if (chart) chart.destroy();
        chart = null;
        return;
    }
    if (filtered.filtered) {
        renderRangeDetail(filtered.labels, filtered.datasets);
        labels = filtered.labels; datasets = filtered.datasets;
    } else {
        renderRangeDetail([], []);
    }

    if (chart) chart.destroy();
    chart = new Chart(document.getElementById('chart'), {
        type: chartType, data: { labels, datasets },
        options: {
            responsive: true, maintainAspectRatio: false,
            interaction: { mode: 'index', intersect: false },
            scales: {
                x: { type: 'time', stacked: chartType === 'bar' && stacked, time: { unit: cfg.unit },
                     grid: { color: 'rgba(255,255,255,0.06)' }, ticks: { color: '#9ca3af', maxRotation: 0 } },
                y: { stacked: chartType === 'bar' && stacked, beginAtZero: true,
                     title: { display: true, text: yL, color: '#9ca3af' },
                     grid: { color: 'rgba(255,255,255,0.06)' }, ticks: { color: '#9ca3af' } },
            },
            plugins: {
                legend: { labels: { color: '#e4e4e7', usePointStyle: true, padding: 16 } },
                tooltip: { backgroundColor: '#1a1d27', borderColor: '#2a2d3a', borderWidth: 1,
                    titleColor: '#e4e4e7', bodyColor: '#e4e4e7',
                    callbacks: { label: ctx => `${ctx.dataset.label}: ${fmt(ctx.parsed.y)} ${yL}` } },
            },
        },
    });
    setStatus(`Letzte Aktualisierung: ${new Date().toLocaleTimeString('de-DE')}`);
}

function renderKPIs() {
    const grid = document.getElementById('kpiGrid');
    grid.innerHTML = '';
    let bezugStats = null, einspStats = null, livePowerW = null;
    seriesConfigs.forEach(cfg => {
        const s = allStats[cfg.ain]; if (!s) return;
        if (cfg.label.toLowerCase().includes('einspe')) einspStats = s; else bezugStats = s;
        if (livePowerW === null && s.power?.length) {
            const f = s.power.reduce((a,b) => a.grid < b.grid ? a : b);
            if (f.values.length) livePowerW = f.values[0];
        }
    });
    const kpi = (label, val, cls, sub) => {
        grid.innerHTML += `<div class="kpi"><div class="label">${label}</div><div class="val ${cls}">${val}</div>${sub ? `<div class="sub">${sub}</div>` : ''}</div>`;
    };

    const bD = bezugStats?.energy?.find(e => e.grid === 86400);
    const eD = einspStats?.energy?.find(e => e.grid === 86400);

    if (bD?.values.length) kpi('Bezug heute', `${fmt(bD.values[0]/1000, 2)} kWh`, 'c-red');
    if (eD?.values.length) kpi('Einspeisung heute', `${fmt(eD.values[0]/1000, 2)} kWh`, 'c-green');

    if (bD?.values.length && eD?.values.length) {
        const tB = bD.values[0], tE = eD.values[0];
        const netto = tB - tE;
        kpi(netto >= 0 ? 'Netto-Bezug' : 'Netto-Einspeisung', `${fmt(Math.abs(netto)/1000, 2)} kWh`, netto >= 0 ? 'c-orange' : 'c-green');

        const kBezug = (tB/1000) * prices.bezug;
        const eEinsp = (tE/1000) * prices.einspeisung;
        const nettoK = kBezug - eEinsp;
        kpi('Kosten heute', `${fmt(nettoK/100, 2)} €`, nettoK >= 0 ? 'c-red' : 'c-green',
            `Bezug ${fmt(kBezug/100,2)}€ − Erlös ${fmt(eEinsp/100,2)}€`);

        const diff = prices.bezug - prices.einspeisung;
        const verschenkt = (tE/1000) * diff;
        kpi('Verschenkt heute', `${fmt(verschenkt/100, 2)} €`, 'c-orange', `${fmt(tE/1000,2)} kWh × ${fmt(diff,1)} ct`);

        const n = Math.min(bD.values.length, eD.values.length, 30);
        let sum30 = 0;
        for (let i = 0; i < n; i++) sum30 += (eD.values[i]/1000) * diff;
        kpi(`Verschenkt ${n}d`, `${fmt(sum30/100, 2)} €`, 'c-orange');
    }

    if (bD && eD && battery.capacity > 0) {
        const sec = document.getElementById('batterySection');
        const bg = document.getElementById('batteryGrid');
        const bn = document.getElementById('batteryName');
        sec.style.display = '';
        bn.textContent = `${battery.name} (${fmt(battery.capacity, 1)} kWh)`;
        bg.innerHTML = '';

        const bkpi = (label, val, cls, sub) => {
            bg.innerHTML += `<div class="kpi"><div class="label">${label}</div><div class="val ${cls}">${val}</div>${sub ? `<div class="sub">${sub}</div>` : ''}</div>`;
        };

        const diff = prices.bezug - prices.einspeisung;
        const nd = Math.min(bD.values.length, eD.values.length, 31);
        let savedMonth = 0, shiftedMonth = 0;
        for (let i = 0; i < nd; i++) {
            const eKwh = eD.values[i] / 1000;
            const bKwh = bD.values[i] / 1000;
            const shifted = Math.min(eKwh, Math.min(bKwh, battery.capacity));
            shiftedMonth += shifted;
            savedMonth += shifted * diff;
        }

        const bM = bezugStats?.energy?.find(e => e.grid === 2678400);
        const eM = einspStats?.energy?.find(e => e.grid === 2678400);
        let savedYear = 0, shiftedYear = 0, monthsUsed = 0;
        if (bM && eM) {
            const nm = Math.min(bM.values.length, eM.values.length);
            for (let i = 0; i < nm; i++) {
                if (bM.values[i] === 0 && eM.values[i] === 0) continue;
                monthsUsed++;
                const eKwh = eM.values[i] / 1000;
                const bKwh = bM.values[i] / 1000;
                const daysInMonth = 30;
                let monthShifted = 0;
                const dailyE = eKwh / daysInMonth;
                const dailyB = bKwh / daysInMonth;
                for (let d = 0; d < daysInMonth; d++) {
                    monthShifted += Math.min(dailyE, Math.min(dailyB, battery.capacity));
                }
                shiftedYear += monthShifted;
                savedYear += monthShifted * diff;
            }
        }

        const yearEst = monthsUsed > 0 ? (savedYear / monthsUsed) * 12 : savedMonth * 12;
        const amort = yearEst > 0 ? battery.price / (yearEst / 100) : Infinity;

        bkpi('Ersparnis/Monat', `${fmt(savedMonth/100, 2)} €`, 'c-green', `${fmt(shiftedMonth, 1)} kWh verschoben`);

        if (monthsUsed > 1) {
            bkpi(`Ersparnis (${monthsUsed} Mon.)`, `${fmt(savedYear/100, 2)} €`, 'c-green', `${fmt(shiftedYear, 0)} kWh verschoben`);
        }

        bkpi('Hochrechnung/Jahr', `${fmt(yearEst/100, 2)} €`, 'c-green',
            monthsUsed > 1 ? `Basis: ${monthsUsed} Monate Daten` : 'Basis: aktueller Monat');

        bkpi('Amortisation', amort < 20 ? `${fmt(amort, 1)} Jahre` : '> 20 Jahre',
            amort < 5 ? 'c-green' : amort < 8 ? 'c-orange' : 'c-red',
            `bei ${fmt(battery.price, 0)} € Anschaffung`);
    }
}

function updateRangeInputs() {
    const fromEl = document.getElementById('rangeFrom');
    const toEl = document.getElementById('rangeTo');
    if (currentPeriod === 'day' || currentPeriod === 'today') {
        fromEl.type = 'time'; toEl.type = 'time';
        prefillHistoryRange();
    } else {
        fromEl.type = 'date'; toEl.type = 'date';
        prefillEnergyRange();
    }
    clearRange();
}

function prefillLiveRange() {
    const fromEl = document.getElementById('rangeFrom');
    const toEl = document.getElementById('rangeTo');
    const s = allStats[seriesConfigs[0]?.ain];
    if (!s?.power?.length) { fromEl.value = ''; toEl.value = ''; return; }
    const b = s.power.find(x => x.grid === 10);
    if (!b) { fromEl.value = ''; toEl.value = ''; return; }
    const n = Math.min(b.values.length, 360);
    const end = new Date(b.datatime * 1000);
    const start = new Date(end.getTime() - (n - 1) * 10000);
    const pad = d => `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    fromEl.value = pad(start);
    toEl.value = pad(end);
}

function prefillHistoryRange() {
    const fromEl = document.getElementById('rangeFrom');
    const toEl = document.getElementById('rangeTo');
    if (!historyData?.readings?.length) { fromEl.value = ''; toEl.value = ''; return; }
    const first = new Date(historyData.readings[1]?.ts * 1000 || historyData.readings[0].ts * 1000);
    const last = new Date(historyData.readings[historyData.readings.length - 1].ts * 1000);
    const pad = d => `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    fromEl.value = pad(first);
    toEl.value = pad(last);
}

function prefillEnergyRange() {
    const fromEl = document.getElementById('rangeFrom');
    const toEl = document.getElementById('rangeTo');
    const cfg = periodConfig(currentPeriod);
    const s = allStats[seriesConfigs[0]?.ain];
    if (!s?.energy?.length) { fromEl.value = ''; toEl.value = ''; return; }
    const b = s.energy.find(x => x.grid === cfg.grid);
    if (!b) { fromEl.value = ''; toEl.value = ''; return; }
    const n = Math.min(b.values.length, cfg.max);
    const labels = buildTimestamps(b.datatime, cfg.grid, n, currentPeriod);
    if (!labels.length) { fromEl.value = ''; toEl.value = ''; return; }
    const oldest = labels[labels.length - 1];
    const newest = labels[0];
    const isoDate = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    fromEl.value = isoDate(oldest);
    toEl.value = isoDate(newest);
}

function clearRange() {
    activeRange = null;
    sessionStorage.removeItem('fritz_range');
    sessionStorage.removeItem('fritz_range_period');
    document.getElementById('rangeReset').style.display = 'none';
    document.getElementById('rangeApply').classList.remove('active');
    document.getElementById('rangeDetail').classList.remove('visible');
}

function applyRange() {
    const fromEl = document.getElementById('rangeFrom');
    const toEl = document.getElementById('rangeTo');
    if (!fromEl.value || !toEl.value) return;

    if (currentPeriod === 'day' || currentPeriod === 'today') {
        const [fh, fm] = fromEl.value.split(':').map(Number);
        const [th, tm] = toEl.value.split(':').map(Number);
        activeRange = { fromMin: fh * 60 + fm, toMin: th * 60 + tm };
    } else {
        activeRange = { fromDate: new Date(fromEl.value + 'T00:00:00'), toDate: new Date(toEl.value + 'T23:59:59') };
    }

    sessionStorage.setItem('fritz_range', JSON.stringify({ from: fromEl.value, to: toEl.value }));
    sessionStorage.setItem('fritz_range_period', currentPeriod);
    document.getElementById('rangeReset').style.display = '';
    document.getElementById('rangeApply').classList.add('active');
    renderChart();
}

function restoreRange() {
    const saved = sessionStorage.getItem('fritz_range');
    const savedPeriod = sessionStorage.getItem('fritz_range_period');
    if (!saved || savedPeriod !== currentPeriod) return false;
    const { from, to } = JSON.parse(saved);
    document.getElementById('rangeFrom').value = from;
    document.getElementById('rangeTo').value = to;
    applyRange();
    return true;
}

function filterByRange(labels, datasets) {
    if (!activeRange) return { labels, datasets, filtered: false };

    const indices = [];
    labels.forEach((lbl, i) => {
        const d = lbl instanceof Date ? lbl : new Date(lbl);
        if (currentPeriod === 'day' || currentPeriod === 'today') {
            const min = d.getHours() * 60 + d.getMinutes();
            if (min >= activeRange.fromMin && min <= activeRange.toMin) indices.push(i);
        } else {
            if (d >= activeRange.fromDate && d <= activeRange.toDate) indices.push(i);
        }
    });

    if (indices.length === 0) return { labels: [], datasets: [], filtered: true, empty: true };

    return {
        labels: indices.map(i => labels[i]),
        datasets: datasets.map(ds => ({ ...ds, data: indices.map(i => ds.data[i]) })),
        filtered: true,
    };
}

function renderRangeDetail(labels, datasets) {
    const panel = document.getElementById('rangeDetail');
    const kpiEl = document.getElementById('rangeKpis');
    const titleEl = document.getElementById('rangeTitle');

    if (!activeRange || !labels.length) { panel.classList.remove('visible'); return; }

    const cfgType = periodConfig(currentPeriod).type;
    const isPower = cfgType === 'power' || cfgType === 'history';
    const first = labels[0] instanceof Date ? labels[0] : new Date(labels[0]);
    const last = labels[labels.length - 1] instanceof Date ? labels[labels.length - 1] : new Date(labels[labels.length - 1]);

    if (currentPeriod === 'day' || currentPeriod === 'today') {
        titleEl.textContent = `${first.toLocaleTimeString('de-DE', {hour:'2-digit',minute:'2-digit'})} – ${last.toLocaleTimeString('de-DE', {hour:'2-digit',minute:'2-digit'})} (${labels.length} Messpunkte)`;
    } else {
        titleEl.textContent = `${first.toLocaleDateString('de-DE')} – ${last.toLocaleDateString('de-DE')} (${labels.length} ${currentPeriod === 'year' ? 'Monate' : 'Tage'})`;
    }

    kpiEl.innerHTML = '';
    const kpi = (label, val, cls, sub) => {
        kpiEl.innerHTML += `<div class="kpi"><div class="label">${label}</div><div class="val ${cls}">${val}</div>${sub ? `<div class="sub">${sub}</div>` : ''}</div>`;
    };

    if (isPower && datasets.length >= 2) {
        const bezugDs = datasets.find(d => d.label === 'Bezug');
        const einspDs = datasets.find(d => d.label === 'Einspeisung');
        if (bezugDs && einspDs) {
            const intervalS = cfgType === 'history' ? 30 : 10;
            const durationH = (labels.length * intervalS) / 3600;
            const bSum = bezugDs.data.reduce((a, b) => a + b, 0);
            const eSum = einspDs.data.reduce((a, b) => a + b, 0);
            const bAvg = bSum / labels.length;
            const eAvg = eSum / labels.length;
            kpi('Bezug (Ø)', `${fmt(bAvg, 0)} W`, 'c-red', `${fmt(bAvg * durationH, 1)} Wh`);
            kpi('Einspeisung (Ø)', `${fmt(eAvg, 0)} W`, 'c-green', `${fmt(eAvg * durationH, 1)} Wh`);
            kpi('Maximum', `${fmt(Math.max(...bezugDs.data), 0)} W Bezug`, 'c-red');
            kpi('Dauer', `${fmt(durationH * 60, 0)} Min.`, 'c-blue');
        }
    } else if (isPower) {
        const ds = datasets[0];
        if (!ds) return;
        const vals = ds.data;
        const avg = vals.reduce((a, b) => a + b, 0) / vals.length;
        const max = Math.max(...vals);
        const min = Math.min(...vals);
        const durationH = (labels.length * 10) / 3600;
        const energyWh = avg * durationH;

        kpi('Durchschnitt', `${fmt(avg, 0)} W`, 'c-blue');
        kpi('Maximum', `${fmt(max, 0)} W`, 'c-red');
        kpi('Minimum', `${fmt(min, 0)} W`, 'c-green');
        kpi('Geschätzte Energie', `${fmt(energyWh, 1)} Wh`, 'c-orange', `${fmt(durationH * 60, 0)} Min.`);
    } else {
        datasets.forEach(ds => {
            const sum = ds.data.reduce((a, b) => a + b, 0);
            const isE = ds.label.toLowerCase().includes('einspe');
            const cls = isE ? 'c-green' : 'c-red';
            kpi(ds.label, `${fmt(sum, 2)} ${currentUnit}`, cls);

            const priceCt = isE ? prices.einspeisung : prices.bezug;
            const sumKwh = currentUnit === 'kWh' ? sum : sum / 1000;
            const cost = (sumKwh * priceCt) / 100;
            kpi(isE ? 'Erlös' : 'Kosten', `${fmt(cost, 2)} €`, cls, `${fmt(priceCt, 1)} ct/kWh`);
        });

        if (datasets.length === 2) {
            const bezugDs = datasets.find(d => !d.label.toLowerCase().includes('einspe'));
            const einspDs = datasets.find(d => d.label.toLowerCase().includes('einspe'));
            if (bezugDs && einspDs) {
                const bSum = bezugDs.data.reduce((a, b) => a + b, 0);
                const eSum = einspDs.data.reduce((a, b) => a + b, 0);
                const netto = bSum - eSum;
                const bKwh = currentUnit === 'kWh' ? bSum : bSum / 1000;
                const eKwh = currentUnit === 'kWh' ? eSum : eSum / 1000;
                const nettoCost = (bKwh * prices.bezug - eKwh * prices.einspeisung) / 100;
                kpi(netto >= 0 ? 'Netto-Bezug' : 'Netto-Einspeisung',
                    `${fmt(Math.abs(netto), 2)} ${currentUnit}`, netto >= 0 ? 'c-orange' : 'c-green');
                kpi('Netto-Kosten', `${fmt(nettoCost, 2)} €`, nettoCost >= 0 ? 'c-red' : 'c-green');
            }
        }
    }

    panel.classList.add('visible');
}

// ── Weather Widget ──

let weatherData = null;

function getStoredPlz() { return localStorage.getItem('fritz_weather_plz') || ''; }
function storePlz(plz) { localStorage.setItem('fritz_weather_plz', plz); }

async function fetchWeather(plz) {
    if (!plz || !/^\d{4,5}$/.test(plz)) return;
    try {
        const res = await fetch(`/api/weather.php?plz=${encodeURIComponent(plz)}`);
        if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error(e.error || `HTTP ${res.status}`); }
        weatherData = await res.json();
        renderWeather(weatherData);
    } catch (e) {
        document.getElementById('wxContent').innerHTML =
            `<div class="wx-placeholder"><div style="color:var(--red);font-size:0.85rem">${e.message}</div></div>`;
    }
}

function renderWeather(w) {
    const c = w.current;
    const d = w.daily;
    const nowHour = new Date().getHours();
    const maxRad = Math.max(...w.hourly.map(h => h.radiation), 1);

    document.getElementById('wxHeading').innerHTML =
        `${c.weather_icon} Wetter &middot; ${w.location.name}`;

    const bestHours = w.solar.best_hours || [];
    const hasSolar = bestHours.length > 0;
    const peakRad = w.solar.peak_radiation || 0;

    let recoClass, recoIcon, recoTitle, recoSub;
    if (hasSolar && peakRad >= 300) {
        recoClass = 'reco-good';
        recoIcon = '\u{1F50C}';
        recoTitle = `Maschinen starten: ${w.solar.window}`;
        recoSub = `Bis ${peakRad} W/m² Sonnenstrahlung — Waschmaschine, Trockner, Spülmaschine jetzt einplanen!`;
    } else if (hasSolar) {
        recoClass = 'reco-ok';
        recoIcon = '\u{26A0}\u{FE0F}';
        recoTitle = `Eingeschränkt nutzbar: ${w.solar.window}`;
        recoSub = `Nur ${peakRad} W/m² erwartet — reicht für kleinere Verbraucher, große Geräte besser verschieben.`;
    } else {
        recoClass = 'reco-bad';
        recoIcon = '\u{1F6D1}';
        recoTitle = 'Heute kein gutes Solarfenster';
        recoSub = 'Kaum Sonnenstrahlung erwartet — Verbrauch möglichst auf einen besseren Tag verschieben.';
    }

    const firstHour = w.hourly[0]?.hour ?? 5;
    const lastHour = w.hourly[w.hourly.length - 1]?.hour ?? 21;
    const totalHours = lastHour - firstHour + 1;

    let segHtml = '';
    w.hourly.forEach(h => {
        const seg = bestHours.includes(h.hour) ? (h.radiation >= 300 ? 'seg-good' : 'seg-ok')
                  : h.radiation > 50 ? 'seg-low' : 'seg-none';
        const widthPct = (1 / totalHours) * 100;
        const label = seg === 'seg-good' || seg === 'seg-ok' ? `${Math.round(h.radiation)}` : '';
        segHtml += `<div class="solar-seg ${seg}" style="width:${widthPct}%" title="${h.time}: ${Math.round(h.radiation)} W/m² • ☁ ${h.cloud_cover}% • ${fmt(h.temperature, 0)}°C">${label}</div>`;
    });

    const nowPct = nowHour >= firstHour && nowHour <= lastHour
        ? ((nowHour - firstHour + new Date().getMinutes() / 60) / totalHours) * 100 : -1;
    const nowMarker = nowPct >= 0 ? `<div class="solar-now-marker" style="left:${nowPct}%"></div>` : '';

    const hourLabels = w.hourly.filter(h => h.hour % 3 === 0 || h.hour === firstHour || h.hour === lastHour)
        .map(h => `<span>${String(h.hour).padStart(2, '0')}</span>`).join('');

    document.getElementById('wxContent').innerHTML = `
        <div class="wx-reco-banner ${recoClass}">
            <div class="reco-icon">${recoIcon}</div>
            <div class="reco-text">
                <div class="reco-title">${recoTitle}</div>
                <div class="reco-sub">${recoSub}</div>
            </div>
        </div>
        <div class="weather-body">
            <div class="wx-current">
                <div class="wx-main">
                    <span class="wx-icon">${c.weather_icon}</span>
                    <span class="wx-temp">${fmt(c.temperature, 0)}&deg;C</span>
                </div>
                <div class="wx-desc">${c.weather_text}</div>
                <div class="wx-details">
                    <span>&#128168; ${fmt(c.wind_speed, 0)} km/h</span>
                    <span>&#128167; ${c.humidity}%</span>
                    <span>&#9729;&#65039; ${c.cloud_cover}%</span>
                </div>
                <div class="wx-details">
                    ${d.temp_max !== null ? `<span>&#9650; ${fmt(d.temp_max, 0)}&deg; &#9660; ${fmt(d.temp_min, 0)}&deg;</span>` : ''}
                    ${d.sunrise ? `<span>&#127749; ${d.sunrise}</span>` : ''}
                    ${d.sunset ? `<span>&#127751; ${d.sunset}</span>` : ''}
                </div>
            </div>
            <div class="solar-timeline">
                <div class="solar-timeline-label">
                    <span>Tagesverlauf Solarertrag</span>
                    <span>${d.sunshine_hours !== null ? fmt(d.sunshine_hours, 1) + 'h Sonne' : ''}</span>
                </div>
                <div class="solar-track">
                    ${segHtml}
                    ${nowMarker}
                </div>
                <div class="solar-hours">${hourLabels}</div>
                <div class="solar-legend">
                    <span class="leg-good">Starten</span>
                    <span class="leg-ok">Eingeschr&auml;nkt</span>
                    <span class="leg-low">Wenig Ertrag</span>
                </div>
            </div>
        </div>
    `;
}

document.getElementById('plzSave').addEventListener('click', () => {
    const plz = document.getElementById('plzInput').value.trim();
    if (/^\d{4,5}$/.test(plz)) { storePlz(plz); fetchWeather(plz); }
});
document.getElementById('plzInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') { document.getElementById('plzSave').click(); }
});

const savedPlz = getStoredPlz();
if (savedPlz) {
    document.getElementById('plzInput').value = savedPlz;
    fetchWeather(savedPlz);
}

async function fetchData() {
    showLoading(true);
    try {
        const cfgRes = await fetch('/api/fritz.php?action=config');
        const cfgData = await cfgRes.json();
        if (cfgData.error) throw new Error(cfgData.error);
        seriesConfigs = cfgData.ains;
        if (cfgData.prices) prices = cfgData.prices;
        if (cfgData.battery) battery = cfgData.battery;
        if (!seriesConfigs.length) { setStatus('Keine AINs konfiguriert.', true); showLoading(false); return; }

        for (const cfg of seriesConfigs) {
            const res = await fetch(`/api/fritz.php?action=stats&ain=${encodeURIComponent(cfg.ain)}`);
            const data = await res.json();
            if (data.error) throw new Error(data.error);
            allStats[cfg.ain] = data;
        }

        const liveRes = await fetch('/api/fritz.php?action=live');
        const liveData = await liveRes.json();
        if (!liveData.error) updateSignal(liveData);

        const histRes = await fetch('/api/fritz.php?action=history');
        const histData = await histRes.json();
        if (!histData.error) {
            historyData = histData;
            historyAvailableDays = histData.available_days || [];
        }

        renderKPIs();
        if (!activeRange) updateRangeInputs();
        renderChart();
    } catch (e) { setStatus('Fehler: ' + e.message, true); }
    showLoading(false);
}

setupBtnGroup('periodGroup', v => { currentPeriod = v; updateRangeInputs(); renderChart(); });
setupBtnGroup('unitGroup',   v => { currentUnit = v;   renderChart(); });
setupBtnGroup('styleGroup',  v => { currentStyle = v;  renderChart(); });

document.getElementById('batteryToggle').addEventListener('click', () => {
    document.getElementById('batterySection').classList.toggle('open');
});

document.getElementById('rangeApply').addEventListener('click', applyRange);
document.getElementById('rangeReset').addEventListener('click', () => { clearRange(); renderChart(); });
document.getElementById('rangeFrom').addEventListener('keydown', e => { if (e.key === 'Enter') applyRange(); });
document.getElementById('rangeTo').addEventListener('keydown', e => { if (e.key === 'Enter') applyRange(); });

const savedPeriod = sessionStorage.getItem('fritz_range_period');
if (savedPeriod && savedPeriod !== currentPeriod) {
    currentPeriod = savedPeriod;
    document.querySelector('#periodGroup .active')?.classList.remove('active');
    document.querySelector(`#periodGroup button[data-value="${savedPeriod}"]`)?.classList.add('active');
}

updateRangeInputs();
fetchData().then(() => restoreRange());
setInterval(fetchData, 30000);
setInterval(() => { const plz = getStoredPlz(); if (plz) fetchWeather(plz); }, 1800000);
</script>
</body>
</html>
